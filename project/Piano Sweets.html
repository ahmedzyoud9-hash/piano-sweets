  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-weight:500;letter-spacing:.22em\">PIANO<\u002Fspan>\n      <span style=\"font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.5em;opacity:.7;padding-bottom:3px\">SWEETS<\u002Fspan>\n    <\u002Fa>\n    <nav class=\"navlinks\" style=\"display:flex;gap:34px;align-items:center\">\n      <sc-for list=\"{{ navLinks }}\" as=\"link\" hint-placeholder-count=\"5\">\n        <a href=\"{{ link.href }}\" style=\"font-family:'Tajawal',sans-serif;font-size:14px;font-weight:300;letter-spacing:.04em;color:#DDC9A4;text-decoration:none;opacity:.78;transition:opacity .3s\" style-hover=\"opacity:1\">{{ link.label }}<\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section id=\"top\" style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse 90% 60% at 50% 38%,#4a262a 0%,#3E1E21 55%,#2C1517 100%)\"><\u002Fdiv>\n    <!-- piano string lines -->\n    <div style=\"position:absolute;inset:0;display:flex;justify-content:center;gap:46px;opacity:.06;pointer-events:none\">\n      <span style=\"width:1px;background:linear-gradient(180deg,transparent,#DDC9A4 30%,#DDC9A4 70%,transparent);height:100%\"><\u002Fspan>\n      <span style=\"width:1px;background:linear-gradient(180deg,transparent,#DDC9A4 30%,#DDC9A4 70%,transparent);height:100%\"><\u002Fspan>\n      <span style=\"width:1px;background:linear-gradient(180deg,transparent,#DDC9A4 30%,#DDC9A4 70%,transparent);height:100%\"><\u002Fspan>\n      <span style=\"width:1px;background:linear-gradient(180deg,transparent,#DDC9A4 30%,#DDC9A4 70%,transparent);height:100%\"><\u002Fspan>\n      <span style=\"width:1px;background:linear-gradient(180deg,transparent,#DDC9A4 30%,#DDC9A4 70%,transparent);height:100%\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;z-index:2;display:flex;flex-direction:column;align-items:center\">\n      <div style=\"animation:floatkey 7s ease-in-out infinite\">\n        <img src=\"a738836c-f6c1-4021-87ba-c79588aba2db\" alt=\"Piano Sweets\" style=\"width:min(440px,76vw);height:auto;display:block;mix-blend-mode:lighten\">\n      <\u002Fdiv>\n      <div style=\"width:54px;height:1px;background:#C2A063;margin:30px 0 26px\"><\u002Fdiv>\n      <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(26px,3.6vw,40px);color:#EBDDC2;letter-spacing:.01em;line-height:1.3\">Composed like music<\u002Fp>\n      <p style=\"font-family:'Tajawal',sans-serif;font-weight:200;font-size:clamp(17px,2vw,21px);letter-spacing:.32em;margin-top:8px;opacity:.82\">مؤلَّفة كالموسيقى<\u002Fp>\n      <p style=\"max-width:540px;margin-top:30px;font-weight:300;font-size:16px;line-height:2;opacity:.66\">شوكولا فاخرة تتحوّل إلى تجربة عاطفية — حيث تُصاغ كل نكهة بتوازنٍ ودِفءٍ وأناقة، تماماً كما تُؤلَّف الموسيقى.<\u002Fp>\n      <a href=\"#story\" style=\"margin-top:42px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.34em;color:#3E1E21;background:#DDC9A4;padding:15px 34px;text-decoration:none;border-radius:2px;transition:transform .35s,background .35s\" style-hover=\"background:#EBDDC2;transform:translateY(-2px)\">DISCOVER PIANO<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STORY -->\n  <section id=\"story\" style=\"position:relative;background:#F6F1E7;color:#3E1E21;padding:clamp(90px,12vw,160px) 24px\">\n    <div style=\"max-width:980px;margin:0 auto;text-align:center\">\n      <div class=\"reveal\" style=\"display:inline-flex;flex-direction:column;align-items:center\">\n        <span style=\"font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.42em;color:#B0894E\">OUR STORY<\u002Fspan>\n        <h2 style=\"font-family:'Tajawal',sans-serif;font-weight:300;font-size:clamp(34px,5vw,58px);margin-top:16px;letter-spacing:.01em\">قصة العلامة<\u002Fh2>\n        <div style=\"width:40px;height:1px;background:#C2A063;margin:28px 0\"><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"reveal\" style=\"font-weight:300;font-size:clamp(18px,2.1vw,22px);line-height:2.1;color:#5a3b36;max-width:760px;margin:0 auto;text-wrap:pretty\">\n        وُلدت <span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;color:#3E1E21\">بيانو<\u002Fspan> لتحوّل الشوكولا إلى تجربةٍ عاطفية. فكما تُؤلَّف كل مقطوعةٍ موسيقية بعناية لتخلق توازناً وجمالاً، تُصنع كل قطعةٍ من بيانو باستخدام أجود الشوكولا الفرنسية ومكوّناتٍ مُنتقاة، لتمنحك لحظاتٍ من الأناقة والدفء والفخامة.\n      <\u002Fp>\n      <p class=\"reveal\" style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:clamp(22px,2.6vw,30px);line-height:1.6;color:#3E1E21;margin-top:48px\">\n        “At Piano, chocolate is more than a gift —<br>it is a language of emotion and unforgettable memories.”\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PHILOSOPHY / DNA -->\n  <section id=\"philosophy\" style=\"position:relative;background:#3E1E21;color:#DDC9A4;padding:clamp(90px,12vw,160px) 24px\">\n    <div style=\"max-width:1120px;margin:0 auto\">\n      <div class=\"reveal\" style=\"text-align:center;display:flex;flex-direction:column;align-items:center;margin-bottom:64px\">\n        <span style=\"font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.42em;color:#C2A063\">BRAND DNA<\u002Fspan>\n        <h2 style=\"font-family:'Tajawal',sans-serif;font-weight:300;font-size:clamp(34px,5vw,58px);margin-top:16px\">الفلسفة<\u002Fh2>\n        <p style=\"font-weight:200;font-size:16px;opacity:.6;margin-top:14px;letter-spacing:.04em\">انسجامٌ يجمع بين الفنّ والعاطفة والفخامة<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"grid3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(221,201,164,.16);border:1px solid rgba(221,201,164,.16)\">\n        <sc-for list=\"{{ values }}\" as=\"v\" hint-placeholder-count=\"6\">\n          <div class=\"reveal\" style=\"background:#3E1E21;padding:48px 34px;display:flex;flex-direction:column;gap:14px;min-height:210px;transition:background .5s\" style-hover=\"background:#46242800\">\n            <span style=\"font-family:'Cormorant Garamond',serif;font-size:18px;color:#C2A063;letter-spacing:.2em\">{{ v.note }}<\u002Fspan>\n            <h3 style=\"font-family:'Tajawal',sans-serif;font-weight:500;font-size:24px;color:#EBDDC2\">{{ v.ar }}<\u002Fh3>\n            <span style=\"font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.34em;opacity:.5\">{{ v.en }}<\u002Fspan>\n            <p style=\"font-weight:300;font-size:14.5px;line-height:1.9;opacity:.66;margin-top:4px\">{{ v.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOUNDER -->\n  <section id=\"founder\" style=\"position:relative;background:#2C1517;color:#DDC9A4;padding:clamp(90px,12vw,160px) 24px;overflow:hidden\">\n    <div class=\"grid2\" style=\"max-width:1080px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:clamp(40px,6vw,90px);align-items:center\">\n      <div class=\"reveal\" style=\"position:relative;aspect-ratio:4/5;border:1px solid rgba(221,201,164,.28);display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(135deg,#34191c,#34191c 12px,#3a1d20 12px,#3a1d20 24px)\">\n        <div style=\"text-align:center;opacity:.5\">\n          <div style=\"width:60px;height:90px;border:1px solid #DDC9A4;border-radius:30px;margin:0 auto;position:relative\">\n            <span style=\"position:absolute;top:14px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#DDC9A4\"><\u002Fspan>\n            <span style=\"position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#DDC9A4\"><\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-family:'Jost',monospace;font-size:10px;letter-spacing:.3em;margin-top:20px\">FOUNDER PORTRAIT<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\">\n        <span style=\"font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.42em;color:#C2A063\">THE FOUNDER<\u002Fspan>\n        <h2 style=\"font-family:'Tajawal',sans-serif;font-weight:300;font-size:clamp(32px,4.4vw,52px);margin-top:16px;line-height:1.2\">شوكولاتييه<br>وعازف بيانو<\u002Fh2>\n        <div style=\"width:40px;height:1px;background:#C2A063;margin:26px 0\"><\u002Fdiv>\n        <p style=\"font-weight:300;font-size:17px;line-height:2.1;opacity:.78;text-wrap:pretty\">آمن مؤسّس بيانو دائماً بأن جمال الموسيقى يكمن في الانسجام، حيث تتآلف كل نوتة مع الأخرى لتخلق عاطفةً وتجربةً لا تُنسى. ومن هذه الفلسفة وُلدت بيانو.<\u002Fp>\n        <p style=\"font-weight:300;font-size:17px;line-height:2.1;opacity:.78;margin-top:18px;text-wrap:pretty\">فبمقاربته للشوكولا كما يقارب الموسيقيّ التأليف، يصوغ النكهات بتوازنٍ وعمقٍ وقوامٍ وأناقة، محوّلاً كل مجموعةٍ إلى تجربةٍ حسية مستوحاة من الموسيقى ذاتها.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COLLECTIONS -->\n  <section id=\"collections\" style=\"position:relative;background:#F6F1E7;color:#3E1E21;padding:clamp(90px,12vw,160px) 24px\">\n    <div style=\"max-width:1180px;margin:0 auto\">\n      <div class=\"reveal\" style=\"text-align:center;display:flex;flex-direction:column;align-items:center;margin-bottom:60px\">\n        <span style=\"font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.42em;color:#B0894E\">COLLECTIONS<\u002Fspan>\n        <h2 style=\"font-family:'Tajawal',sans-serif;font-weight:300;font-size:clamp(34px,5vw,58px);margin-top:16px\">المجموعات<\u002Fh2>\n        <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,2.4vw,26px);color:#7a5249;margin-top:12px\">Every flavor plays a different note.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"grid3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px\">\n        <sc-for list=\"{{ collections }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div class=\"reveal\" style=\"display:flex;flex-direction:column\">\n            <div style=\"aspect-ratio:4/5;background:repeating-linear-gradient(135deg,#ece2cf,#ece2cf 14px,#e6dac2 14px,#e6dac2 28px);border:1px solid #d8c8a6;display:flex;align-items:flex-end;justify-content:center;position:relative;overflow:hidden;transition:transform .5s\" style-hover=\"transform:translateY(-6px)\">\n              <span style=\"position:absolute;top:20px;right:22px;font-family:'Cormorant Garamond',serif;font-size:46px;color:#c2a063;opacity:.55\">{{ c.num }}<\u002Fspan>\n              <span style=\"font-family:'Jost',monospace;font-size:10px;letter-spacing:.28em;color:#9a8156;padding-bottom:22px\">{{ c.shot }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Tajawal',sans-serif;font-weight:500;font-size:22px;margin-top:20px\">{{ c.ar }}<\u002Fh3>\n            <span style=\"font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.3em;color:#b0894e;margin-top:6px\">{{ c.en }}<\u002Fspan>\n            <p style=\"font-weight:300;font-size:15px;line-height:1.9;color:#6a4a43;margin-top:10px\">{{ c.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- OCCASIONS -->\n  <section id=\"occasions\" style=\"position:relative;background:#3E1E21;color:#DDC9A4;padding:clamp(90px,12vw,160px) 24px\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div class=\"reveal\" style=\"text-align:center;display:flex;flex-direction:column;align-items:center;margin-bottom:60px\">\n        <span style=\"font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.42em;color:#C2A063\">OCCASIONS<\u002Fspan>\n        <h2 style=\"font-family:'Tajawal',sans-serif;font-weight:300;font-size:clamp(34px,5vw,58px);margin-top:16px\">المناسبات<\u002Fh2>\n        <p style=\"font-weight:200;font-size:16px;opacity:.6;margin-top:14px\">تجربةٌ تبقى طويلاً بعد آخر نوتة<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"grid3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px\">\n        <sc-for list=\"{{ occasions }}\" as=\"o\" hint-placeholder-count=\"3\">\n          <div class=\"reveal\" style=\"border:1px solid rgba(221,201,164,.2);padding:48px 32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;transition:border-color .5s,background .5s\" style-hover=\"border-color:rgba(221,201,164,.45);background:rgba(221,201,164,.04)\">\n            <div style=\"width:46px;height:70px;border:1px solid #C2A063;border-radius:23px;position:relative;margin-bottom:6px\">\n              <span style=\"position:absolute;top:11px;left:50%;transform:translateX(-50%);width:3.5px;height:3.5px;border-radius:50%;background:#C2A063\"><\u002Fspan>\n              <span style=\"position:absolute;bottom:11px;left:50%;transform:translateX(-50%);width:3.5px;height:3.5px;border-radius:50%;background:#C2A063\"><\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Tajawal',sans-serif;font-weight:500;font-size:23px;color:#EBDDC2\">{{ o.ar }}<\u002Fh3>\n            <span style=\"font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.32em;opacity:.5\">{{ o.en }}<\u002Fspan>\n            <p style=\"font-weight:300;font-size:14.5px;line-height:1.9;opacity:.66\">{{ o.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ENQUIRY -->\n  <section id=\"enquiry\" style=\"position:relative;background:#F6F1E7;color:#3E1E21;padding:clamp(90px,12vw,160px) 24px\">\n    <div class=\"formgrid\" style=\"max-width:1040px;margin:0 auto;display:grid;grid-template-columns:.9fr 1.1fr;gap:clamp(40px,6vw,80px);align-items:start\">\n      <div class=\"reveal\">\n        <span style=\"font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.42em;color:#B0894E\">ENQUIRIES &amp; ORDERS<\u002Fspan>\n        <h2 style=\"font-family:'Tajawal',sans-serif;font-weight:300;font-size:clamp(32px,4.6vw,52px);margin-top:16px;line-height:1.2\">اطلب<br>تجربتك الخاصة<\u002Fh2>\n        <div style=\"width:40px;height:1px;background:#C2A063;margin:26px 0\"><\u002Fdiv>\n        <p style=\"font-weight:300;font-size:16px;line-height:2;color:#5a3b36;max-width:340px;text-wrap:pretty\">لطلبات الأفراد، الإهداء، أو المناسبات والشركات — اترك تفاصيلك وسيتواصل معك فريق بيانو لتأليف تجربةٍ تليق باللحظة.<\u002Fp>\n        <div style=\"margin-top:34px;display:flex;flex-direction:column;gap:10px\">\n          <span style=\"font-weight:400;font-size:15px\">مجمع الغوالي — الكويت<\u002Fspan>\n          <span style=\"font-family:'Jost',sans-serif;font-size:13px;letter-spacing:.06em;direction:ltr;text-align:right;opacity:.7\">+965 0000 0000<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reveal\">\n        <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border:1px solid #C2A063;background:#fff;padding:48px 36px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px\">\n            <div style=\"width:46px;height:70px;border:1px solid #C2A063;border-radius:23px;position:relative\">\n              <span style=\"position:absolute;top:11px;left:50%;transform:translateX(-50%);width:3.5px;height:3.5px;border-radius:50%;background:#C2A063\"><\u002Fspan>\n              <span style=\"position:absolute;bottom:11px;left:50%;transform:translateX(-50%);width:3.5px;height:3.5px;border-radius:50%;background:#C2A063\"><\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Tajawal',sans-serif;font-weight:500;font-size:24px;margin-top:6px\">شكراً لك<\u002Fh3>\n            <p style=\"font-weight:300;font-size:15px;line-height:1.9;color:#5a3b36;max-width:300px\">وصلنا طلبك — سيتواصل معك فريق بيانو قريباً لتأليف تجربتك.<\u002Fp>\n            <button onclick=\"{{ reset }}\" style=\"margin-top:10px;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.3em;background:none;border:none;color:#B0894E;cursor:pointer;text-decoration:underline;text-underline-offset:4px\">SEND ANOTHER<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ submit }}\" style=\"display:flex;flex-direction:column;gap:18px\">\n            <div class=\"formgrid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n              <input class=\"pn-input\" required=\"\" placeholder=\"الاسم\" style=\"font-family:'Tajawal',sans-serif;font-size:15px;font-weight:300;color:#3E1E21;background:#fff;border:1px solid #ddccac;padding:15px 16px;border-radius:2px;outline:none\">\n              <input class=\"pn-input\" required=\"\" placeholder=\"رقم التواصل\" style=\"font-family:'Tajawal',sans-serif;font-size:15px;font-weight:300;color:#3E1E21;background:#fff;border:1px solid #ddccac;padding:15px 16px;border-radius:2px;outline:none\">\n            <\u002Fdiv>\n            <select class=\"pn-input\" style=\"font-family:'Tajawal',sans-serif;font-size:15px;font-weight:300;color:#5e3b36;background:#fff;border:1px solid #ddccac;padding:15px 16px;border-radius:2px;outline:none;appearance:none\">\n              <option>نوع الطلب — أفراد<\u002Foption>\n              <option>إهداء فاخر<\u002Foption>\n              <option>مناسبة / عُرس<\u002Foption>\n              <option>طلب شركات<\u002Foption>\n            <\u002Fselect>\n            <textarea class=\"pn-input\" rows=\"4\" placeholder=\"تفاصيل طلبك أو مناسبتك\" style=\"font-family:'Tajawal',sans-serif;font-size:15px;font-weight:300;color:#3E1E21;background:#fff;border:1px solid #ddccac;padding:15px 16px;border-radius:2px;outline:none;resize:vertical\"><\u002Ftextarea>\n            <button type=\"submit\" style=\"margin-top:6px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.34em;color:#F6F1E7;background:#3E1E21;border:none;padding:17px 34px;border-radius:2px;cursor:pointer;transition:background .35s\" style-hover=\"background:#2C1517\">SEND ENQUIRY<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- KEY PHRASE BANNER -->\n  <section style=\"background:#2C1517;color:#DDC9A4;padding:clamp(80px,11vw,140px) 24px;text-align:center\">\n    <p class=\"reveal\" style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(28px,4.4vw,52px);line-height:1.5;max-width:900px;margin:0 auto;color:#EBDDC2\">“Where emotion inspires creation.”<\u002Fp>\n    <p class=\"reveal\" style=\"font-family:'Tajawal',sans-serif;font-weight:200;font-size:clamp(16px,2vw,20px);letter-spacing:.2em;margin-top:18px;opacity:.7\">حيث تُلهم العاطفة الإبداع<\u002Fp>\n  <\u002Fsection>\n\n  <!-- CONTACT / FOOTER -->\n  <footer id=\"contact\" style=\"background:#3E1E21;color:#DDC9A4;padding:clamp(80px,10vw,130px) 24px 48px\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div class=\"footgrid\" style=\"display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:48px;align-items:start;padding-bottom:64px;border-bottom:1px solid rgba(221,201,164,.16)\">\n        <div class=\"reveal\">\n          <div style=\"display:flex;align-items:baseline;gap:10px\">\n            <span style=\"font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:500;letter-spacing:.2em\">PIANO<\u002Fspan>\n            <span style=\"font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.5em;opacity:.7;padding-bottom:4px\">SWEETS<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-weight:300;font-size:15px;line-height:2;opacity:.66;margin-top:20px;max-width:320px\">شوكولا فاخرة مؤلَّفة كالموسيقى — من أجود الشوكولا الفرنسية، صُنعت لتُلهم وتُهدى وتبقى في الذاكرة.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"reveal\" style=\"display:flex;flex-direction:column;gap:14px\">\n          <span style=\"font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.34em;color:#C2A063;margin-bottom:6px\">VISIT US<\u002Fspan>\n          <span style=\"font-weight:300;font-size:15px;opacity:.8\">مجمع الغوالي — الكويت<\u002Fspan>\n          <span style=\"font-weight:300;font-size:15px;opacity:.8;direction:ltr;text-align:right\">Al Ghawali Complex, Kuwait<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"reveal\" style=\"display:flex;flex-direction:column;gap:14px\">\n          <span style=\"font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.34em;color:#C2A063;margin-bottom:6px\">CONNECT<\u002Fspan>\n          <a href=\"#\" style=\"font-weight:300;font-size:15px;opacity:.8;color:#DDC9A4;text-decoration:none;transition:opacity .3s\" style-hover=\"opacity:1\">Instagram<\u002Fa>\n          <a href=\"#\" style=\"font-weight:300;font-size:15px;opacity:.8;color:#DDC9A4;text-decoration:none;transition:opacity .3s\" style-hover=\"opacity:1\">WhatsApp<\u002Fa>\n          <a href=\"#\" style=\"font-weight:300;font-size:15px;opacity:.8;color:#DDC9A4;text-decoration:none;transition:opacity .3s\" style-hover=\"opacity:1\">Enquiries<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;padding-top:28px\">\n        <span style=\"font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.2em;opacity:.45\">© 2026 PIANO SWEETS · ALL RIGHTS RESERVED<\u002Fspan>\n        <span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;opacity:.6\">Crafted in harmony.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { sent: false };\n  componentDidMount() {\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n    }, { threshold: 0.12 });\n    this.el.querySelectorAll('.reveal').forEach((n, i) => {\n      n.style.transitionDelay = (Math.min(i % 3, 2) * 0.09) + 's';\n      io.observe(n);\n    });\n    const nav = this.el.querySelector('#topnav');\n    const onScroll = () => {\n      if (!nav) return;\n      nav.style.background = window.scrollY > 60\n        ? 'rgba(44,21,23,.86)' : 'linear-gradient(180deg,rgba(44,21,23,.72),rgba(44,21,23,0))';\n    };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    this._onScroll = onScroll;\n  }\n  componentWillUnmount() { if (this._onScroll) window.removeEventListener('scroll', this._onScroll); }\n  get el() { return this._root || (this._root = document.querySelector('[dir=rtl]')); }\n  renderVals() {\n    return {\n      goTop: (e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); },\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      submit: (e) => { e.preventDefault(); this.setState({ sent: true }); },\n      reset: () => this.setState({ sent: false }),\n      navLinks: [\n        { label: 'قصتنا', href: '#story' },\n        { label: 'الفلسفة', href: '#philosophy' },\n        { label: 'المؤسس', href: '#founder' },\n        { label: 'المجموعات', href: '#collections' },\n        { label: 'اطلب', href: '#enquiry' },\n        { label: 'تواصل', href: '#contact' },\n      ],\n      values: [\n        { note: '♪', ar: 'الانسجام', en: 'HARMONY', desc: 'توازنٌ دقيق بين النكهات والقوام، كما تتآلف النوتات في مقطوعة.' },\n        { note: '♪', ar: 'الرُقيّ', en: 'SOPHISTICATION', desc: 'لمسةٌ راقية في كل تفصيل، من المكوّن إلى التقديم.' },\n        { note: '♪', ar: 'العاطفة', en: 'EMOTION', desc: 'لغةٌ من المشاعر والتقدير تتجاوز كونها مجرّد هدية.' },\n        { note: '♪', ar: 'الحِرفية', en: 'CRAFTSMANSHIP', desc: 'صناعةٌ يدوية متقنة بأجود الشوكولا الفرنسية.' },\n        { note: '♪', ar: 'الفخامة الفنية', en: 'ARTISTIC LUXURY', desc: 'فنٌّ وفخامة يجتمعان في تجربةٍ بصرية وحسية.' },\n        { note: '♪', ar: 'التجربة الحسية', en: 'SENSORY EXPERIENCE', desc: 'لحظاتٌ تُعاش بكل الحواس وتبقى طويلاً في الذاكرة.' },\n      ],\n      collections: [\n        { num: 'I', shot: 'COLLECTION SHOT', ar: 'مجموعة التوقيع', en: 'SIGNATURE NOTES', desc: 'نكهاتٌ كلاسيكية مؤلَّفة بعنايةٍ تعزف لحن بيانو الأصيل.' },\n        { num: 'II', shot: 'COLLECTION SHOT', ar: 'الإهداء الفاخر', en: 'GIFTING SUITE', desc: 'علبٌ أنيقة تجمع بين الفنّ والفخامة لمناسباتك الخاصة.' },\n        { num: 'III', shot: 'COLLECTION SHOT', ar: 'مناسبات مميزة', en: 'CELEBRATIONS', desc: 'تشكيلاتٌ للأعراس والمناسبات تصنع لحظاتٍ لا تُنسى.' },\n      ],\n      occasions: [\n        { ar: 'الأفراد', en: 'INDIVIDUALS', desc: 'لحظاتٌ حميمة تستحق نكهةً تليق بها.' },\n        { ar: 'الشركات', en: 'CORPORATE', desc: 'إهداءٌ مؤسسيّ راقٍ يترك انطباعاً يدوم.' },\n        { ar: 'الإهداء', en: 'GIFTING', desc: 'هديةٌ تعبّر عن التقدير بلغة العاطفة.' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
